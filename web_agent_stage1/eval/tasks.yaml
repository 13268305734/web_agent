# Stage 2 task configuration.
# These tasks are intentionally simple and do not require login, payment, captcha, or private data.

- id: wiki_search_web_agent
  site: wikipedia
  url: "https://www.wikipedia.org/"
  instruction: "Search for Web agent on Wikipedia and reach the search results page."
  search_query: "Web agent"
  success_condition:
    type: "url_contains"
    value: "search=Web+agent"
  max_steps: 12

- id: wiki_search_playwright
  site: wikipedia
  url: "https://www.wikipedia.org/"
  instruction: "Search for Playwright on Wikipedia and open the result page."
  search_query: "Playwright"
  success_condition:
    type: "url_contains"
    value: "Playwright"
  max_steps: 12

- id: wiki_search_selenium
  site: wikipedia
  url: "https://www.wikipedia.org/"
  instruction: "Search for Selenium software on Wikipedia and open the result page."
  search_query: "Selenium software"
